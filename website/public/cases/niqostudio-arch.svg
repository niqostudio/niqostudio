<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="system-ui, -apple-system, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#44403c"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#faf9f8"/>

  <!-- リポ境界ラベル -->
  <text x="600" y="84" text-anchor="middle" font-size="28" fill="#57534e">1つのリポジトリ ・ 全コード public</text>
  <rect x="70" y="112" width="1060" height="438" rx="12" fill="none" stroke="#d6d3d1" stroke-width="2"/>

  <!-- website（読む） -->
  <rect x="130" y="250" width="270" height="190" rx="6" fill="#ffffff" stroke="#d6d3d1" stroke-width="2"/>
  <text x="265" y="348" text-anchor="middle" font-size="36" font-weight="600" fill="#1c1917">website</text>
  <text x="265" y="390" text-anchor="middle" font-size="22" fill="#57534e">公開サイト</text>

  <!-- core（正本・強調） -->
  <rect x="465" y="250" width="270" height="190" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="556" y="234" width="88" height="32" rx="16" fill="#16a34a"/>
  <text x="600" y="256" text-anchor="middle" font-size="18" font-weight="600" fill="#ffffff">正本</text>
  <text x="600" y="350" text-anchor="middle" font-size="36" font-weight="600" fill="#16a34a">core</text>
  <text x="600" y="392" text-anchor="middle" font-size="22" fill="#57534e">DB・スキーマ</text>

  <!-- studio（書く） -->
  <rect x="800" y="250" width="270" height="190" rx="6" fill="#ffffff" stroke="#d6d3d1" stroke-width="2"/>
  <text x="935" y="348" text-anchor="middle" font-size="36" font-weight="600" fill="#1c1917">studio</text>
  <text x="935" y="390" text-anchor="middle" font-size="22" fill="#57534e">業務システム</text>

  <!-- website → core（読む） -->
  <line x1="404" y1="345" x2="461" y2="345" stroke="#44403c" stroke-width="2.5" marker-end="url(#arw)"/>
  <text x="432" y="328" text-anchor="middle" font-size="20" fill="#57534e">読む</text>

  <!-- studio → core（書く） -->
  <line x1="796" y1="345" x2="739" y2="345" stroke="#44403c" stroke-width="2.5" marker-end="url(#arw)"/>
  <text x="768" y="328" text-anchor="middle" font-size="20" fill="#57534e">書く</text>

  <!-- 主張 -->
  <text x="600" y="610" text-anchor="middle" font-size="26" fill="#57534e">DB スキーマを正本に、読みと書きを分ける</text>
</svg>

# niqostudio-saas（SaaS 共通アカウント基盤）のローカルスタック。
# 内部スタック（../supabase）と並走できるよう、ポートは 55xxx 帯にずらしてある。
# 起動は infra の `saas:*` スクリプト（supabase --workdir supabase-saas …）。
project_id = "niqostudio-saas"

[api]
enabled = true
port = 55321
# 露出は identity スキーマのみ。本番値は stacks/supabase-saas（supabase_settings）と一致させる。
schemas = ["identity", "graphql_public"]
extra_search_path = ["identity", "extensions"]
max_rows = 1000

[db]
port = 55322
shadow_port = 55320
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false
port = 55329

[db.migrations]
enabled = true

[db.seed]
# seed は root の saas:reset オーケストレータが dbmate 適用後に pg で投入する（supabase 自動 seed は無効）。
enabled = false

# identity 基盤に不要なサービスは止めてスタックを軽くする（realtime / storage / functions / analytics）。
[realtime]
enabled = false

[studio]
enabled = true
port = 55323
api_url = "http://127.0.0.1"

# ローカルの auth メール（確認・リセット）の確認用 UI。
[inbucket]
enabled = true
port = 55324

[storage]
enabled = false

# billing service（saas-platform/functions）をローカルで動かすため有効化。
# 関数は別ディレクトリ（saas-platform/functions）にあるため functions パスを指す。
[edge_runtime]
enabled = true

[functions]
# 関数の正本は saas-platform/functions（infra の supabase ディレクトリ外）。
# 各関数を明示登録する（verify_jwt=false＝billing は匿名/webhook を受けるため自前で検証する）。
# import map（functions/deno.json）はここに宣言しない：宣言すると supabase start が起動時に
# ファイルの存在を要求し、symlink を張っていない環境（CI の check・素の clone）で起動が落ちる。
# serve は自動で拾い、deploy は release が --import-map で明示する。
[functions.billing-prices]
enabled = true
verify_jwt = false
[functions.billing-checkout]
enabled = true
verify_jwt = false
[functions.billing-return]
enabled = true
verify_jwt = false
[functions.billing-webhook]
enabled = true
verify_jwt = false
[functions.billing-keys]
enabled = true
verify_jwt = false

[analytics]
enabled = false

[auth]
enabled = true
# ローカルは製品の dev サーバ（ポートは製品 repo 側の任意）からの redirect を受ける。
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
password_requirements = ""

[auth.rate_limit]
# CLI 既定の 2/h だとテンプレートのプレビュー（複数通）で詰まる。本番（config.json）と同値に。
email_sent = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
# ローカルはメール確認なしで signUp を完結させる（本番は mailer_autoconfirm=false＝確認必須）。
# テンプレートのプレビューで confirmation を出したいときだけ一時的に true にして stop/start。
enable_confirmations = false

# テンプレートは本番（stacks/supabase-saas が Management API へ宣言）と同じファイルを参照する＝単一ソース。
# プレビュー: saas:start 後にメールを発火し Mailpit（http://127.0.0.1:55324）で見る。
[auth.email.template.confirmation]
subject = "{{ if .Data.product_name }}Confirm your email for {{ .Data.product_name }}{{ else }}Confirm your email address{{ end }}"
content_path = "../stacks/supabase-saas/templates/confirmation.html"

[auth.email.template.magic_link]
subject = "{{ if .Data.product_name }}Sign in to {{ .Data.product_name }}{{ else }}Sign in to NIQO STUDIO{{ end }}"
content_path = "../stacks/supabase-saas/templates/magic_link.html"

[auth.email.template.recovery]
subject = "Reset your password"
content_path = "../stacks/supabase-saas/templates/recovery.html"

[auth.email.template.email_change]
subject = "Confirm your new email address"
content_path = "../stacks/supabase-saas/templates/email_change.html"

[auth.sms]
enable_signup = false

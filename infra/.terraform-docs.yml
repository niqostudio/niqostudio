# terraform-docs 設定（v0.20+）。各 module / stack の README に表を注入する。
# 生成: scripts/gen-docs.ps1（Windows） / scripts/gen-docs.sh（POSIX）
# CI で差分チェック: terraform-docs --config .terraform-docs.yml --output-check <dir>

formatter: markdown table

sections:
  show:
    - requirements
    - providers
    - inputs
    - outputs
    - resources

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

sort:
  enabled: true
  by: required

settings:
  anchor: false
  description: true
  lockfile: false

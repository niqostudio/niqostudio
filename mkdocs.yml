site_name: NIQO STUDIO docs
site_description: NIQO STUDIO システム（website / core / studio / infra）のドキュメント
site_url: https://niqostudio.github.io/niqostudio/
docs_dir: docs

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      toggle: { icon: material/weather-night, name: ダークに切替 }
    - scheme: slate
      toggle: { icon: material/weather-sunny, name: ライトに切替 }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      # 日本語見出しのアンカーを保持する（既定 slugify は非 ASCII を落とすため）。
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds: { case: lower }
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - はじめに: index.md
  - アーキテクチャ: architecture.md
  - 変数の配置: variables.md
  - デプロイ手順: deploy.md
  - セキュリティ: security.md
  - データベース:
      - スキーマ: core/schema.md
      - 運用: database.md
  - SaaS 基盤:
      - アーキテクチャ: saas/architecture.md
      - 製品統合契約: saas/contract.md
      - 課金（billing）: saas/billing.md
  - infra:
      - Cloudflare 手順: infra/cloudflare.md
      - Resend 手順: infra/resend.md
      - Supabase 手順: infra/supabase.md
      - メール設計: infra/email.md
      - 復旧手順: infra/recovery.md
      - 用語集: infra/glossary.md
  - ADR:
      - 0001 モノリポ構成: adr/0001-monorepo.md
      - 0002 config domain-centric: adr/0002-config-domain-centric.md
      - 0003 環境モデル: adr/0003-environment-per-module.md
      - 0004 migration ツール: adr/0004-migration-tooling.md
      - 0005 Supabase を infra へ: adr/0005-supabase-into-infra-platform.md
      - 0006 公開 view の SECURITY DEFINER: adr/0006-public-views-security-definer.md
      - 0007 SaaS identity を別プロジェクトへ: adr/0007-saas-identity-project.md
      - 0008 SaaS 課金の横断集約: adr/0008-saas-billing-centralized.md
      - 0009 verify / release の2本化: adr/0009-release-pipeline.md

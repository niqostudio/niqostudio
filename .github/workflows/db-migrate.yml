name: "db: migrate"

# 本番 DB（core / studio スキーマ）への適用。明示の dispatch のみ（apply=false は status のみ）。
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "true で本番適用 / false は status（pending 表示）のみ"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  migrate:
    if: github.repository == 'niqostudio/niqostudio'
    runs-on: ubuntu-latest
    environment: core-production # 承認ゲート + secret をスコープ（最小権限）
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # dbmate は root devDep。root のみ入れる（website の重い依存は不要）。
      - run: pnpm install --frozen-lockfile --filter niqostudio-mono
      - name: dbmate（core / studio を本番へ）
        # 接続は Session pooler（IPv4）。GitHub runner は IPv6 直結に届かないため。
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          for ns in core studio; do
            if [ "${{ inputs.apply }}" = "true" ]; then
              echo "::group::$ns 適用"
              pnpm exec dbmate --migrations-dir "$ns/migrations" --migrations-table "${ns}_migrations" --no-dump-schema up
            else
              echo "::group::$ns status（dry-run）"
              pnpm exec dbmate --migrations-dir "$ns/migrations" --migrations-table "${ns}_migrations" status
            fi
            echo "::endgroup::"
          done

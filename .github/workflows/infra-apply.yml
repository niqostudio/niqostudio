name: "infra: apply"

# 本番 infra を apply する。シークレットを使うため dispatch のみ（fork PR からは動かない）。
# 跨ぎ配布（publish-contract）は monorepo では不要なので持たない。
on:
  workflow_dispatch:

permissions:
  contents: read

# state への同時書き込みを防ぐ。
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == 'niqostudio/niqostudio'
    runs-on: ubuntu-latest
    environment: infra-production # 承認ゲート + secret をモジュールにスコープ（最小権限）
    env:
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_TERRAFORM_TOKEN }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.R2_TFSTATE_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_TFSTATE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.5"

      - name: apply niqostudio-com
        working-directory: infra/stacks/niqostudio-com
        # 機微(PII)は Secret、公開DNS(Resend)は Variable に分離して env 経由で渡す。
        env:
          R2_TFSTATE_BUCKET:   ${{ vars.R2_TFSTATE_BUCKET }}
          CF_ACCOUNT_ID:       ${{ vars.CF_ACCOUNT_ID }}
          TF_VAR_forward_to:   ${{ secrets.EMAIL_FORWARD_TO }}
          RESEND_DNS_RECORDS:  ${{ vars.RESEND_DNS_RECORDS }}
        run: |
          # 公開DNS(Resend)は JSON 配列の Variable。TF_VAR は HCL 解釈で JSON object を受けないため、
          # terraform が native JSON で読む .auto.tfvars.json に包んで渡す（未設定は空リスト）。
          printf '{"resend_dns_records": %s}' "${RESEND_DNS_RECORDS:-[]}" > resend.auto.tfvars.json
          cat > backend.tfbackend <<EOF
          bucket    = "$R2_TFSTATE_BUCKET"
          key       = "niqostudio-com/terraform.tfstate"
          endpoints = { s3 = "https://$CF_ACCOUNT_ID.r2.cloudflarestorage.com" }
          EOF
          terraform init -backend-config=backend.tfbackend -input=false
          terraform apply -auto-approve -input=false

      - name: apply niqo-studio
        working-directory: infra/stacks/niqo-studio
        env:
          R2_TFSTATE_BUCKET: ${{ vars.R2_TFSTATE_BUCKET }}
          CF_ACCOUNT_ID:     ${{ vars.CF_ACCOUNT_ID }}
        run: |
          cat > backend.tfbackend <<EOF
          bucket    = "$R2_TFSTATE_BUCKET"
          key       = "niqo-studio/terraform.tfstate"
          endpoints = { s3 = "https://$CF_ACCOUNT_ID.r2.cloudflarestorage.com" }
          EOF
          terraform init -backend-config=backend.tfbackend -input=false
          terraform apply -auto-approve -input=false

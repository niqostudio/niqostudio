name: "infra: validate"

# infra の fmt / validate。シークレット不要なので fork PR でも安全に動く。
# terraform は infra 所有の npm（@jahed/terraform）を使う＝版は infra/package.json 一本（env グローバル CLI に依存しない）。
on:
  pull_request:
    paths: ["infra/**", "config.*.json"]
  push:
    branches: [main]
    paths: ["infra/**", "config.*.json"]

permissions:
  contents: read

defaults:
  run:
    working-directory: infra

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # terraform バイナリは @jahed/terraform が初回実行時に取得（HashiCorp 署名＋checksum 検証）。
      - name: install
        run: pnpm install --frozen-lockfile --filter @niqostudio/infra
      - name: fmt
        run: pnpm --filter @niqostudio/infra exec terraform fmt -recursive -check -diff
      # backend 無しで init して validate（リモート state / API に触れない）。
      - name: validate
        run: |
          for dir in stacks/*/; do
            echo "== validate $dir =="
            pnpm --filter @niqostudio/infra exec terraform -chdir="$dir" init -backend=false -input=false
            pnpm --filter @niqostudio/infra exec terraform -chdir="$dir" validate
          done

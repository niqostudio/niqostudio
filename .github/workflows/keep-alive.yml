name: keep-alive

on:
  schedule:
    - cron: "0 0 */3 * *"   # Free Tier の7日自動停止を回避
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    if: github.repository == 'niqostudio/niqostudio'
    runs-on: ubuntu-latest
    steps:
      - name: ping Supabase
        # 実 DB クエリで活動を発生させる。website と同じ公開読み取り面（core.public_profile）を叩く。
        # 公開関係は core スキーマにあり既定（public）では引けないため Accept-Profile: core を明示する。
        # 新キーモデル: publishable key を apikey ヘッダで送る（URL/publishable は公開値=Variable）。
        env:
          SUPABASE_URL:             ${{ vars.PUBLIC_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          curl -fsS --retry 3 --retry-delay 5 --max-time 30 \
            "$SUPABASE_URL/rest/v1/public_profile?select=id&limit=1" \
            -H "apikey: $SUPABASE_PUBLISHABLE_KEY" \
            -H "Accept-Profile: core" \
            -o /dev/null

      - name: ping Supabase (niqostudio-saas)
        # 2プロジェクト目（SaaS アカウント基盤）。anon に開いている identity.products を叩いて実 DB 活動にする。
        # Variables 未設定（プロジェクト未作成）の間は skip。
        if: vars.PUBLIC_SAAS_SUPABASE_URL != ''
        env:
          SUPABASE_URL:             ${{ vars.PUBLIC_SAAS_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.PUBLIC_SAAS_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          curl -fsS --retry 3 --retry-delay 5 --max-time 30 \
            "$SUPABASE_URL/rest/v1/products?select=id&limit=1" \
            -H "apikey: $SUPABASE_PUBLISHABLE_KEY" \
            -H "Accept-Profile: identity" \
            -o /dev/null

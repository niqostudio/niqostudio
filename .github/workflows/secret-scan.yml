name: secret-scan

# public リポの境界防衛。秘密値は gitleaks（履歴走査）で、絶対パス/ホームパスと秘密ファイルの誤追跡は hygiene で検出する。
# org アカウントでは gitleaks-action が有料ライセンス必須になるため、MIT の gitleaks CLI を直接実行する。
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.18.4"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 履歴も走査する
      - name: install gitleaks (CLI)
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
      - name: scan
        run: ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1 -v

  # gitleaks の死角（秘密値ではないが漏らしたくないもの）を検出する。
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 絶対パス・ホームパスを検出（ユーザー環境の漏洩）
        run: |
          if git grep -nIE 'C:\\Users|/Users/[A-Za-z]|/home/[A-Za-z]' -- . ':(exclude)pnpm-lock.yaml' ':(exclude).github/workflows/secret-scan.yml'; then
            echo "::error::絶対パス/ホームパスが含まれています"; exit 1
          fi
      - name: 秘密・状態ファイルの誤追跡を検出
        run: |
          if git ls-files | grep -nE '(^|/)\.env(\.local)?$|(^|/)\.env\.[^./]+\.local$|\.tfvars$|\.tfvars\.json$|\.tfstate|(^|/)\.niqo/|\.tfbackend$'; then
            echo "::error::追跡してはいけない秘密/状態ファイルがあります（.env / tfvars / tfstate / .niqo / tfbackend）"; exit 1
          fi

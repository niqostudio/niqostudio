name: secret-scan

# public リポなので、秘密値の誤コミットを gitleaks で検出する（境界の自動防衛）。
# org アカウントでは gitleaks-action が有料ライセンス必須になるため、MIT の gitleaks CLI を直接実行する。
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.18.4"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 履歴も走査する
      - name: install gitleaks (CLI)
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
      - name: scan
        run: ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1 -v

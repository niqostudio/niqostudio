name: terraform-docs

# infra の module / stack README が terraform-docs 生成結果と一致するかチェックする。
# 差分があれば失敗 → ローカルで scripts/gen-docs を実行してコミットする。
on:
  pull_request:
    paths:
      - "infra/modules/**/*.tf"
      - "infra/stacks/**/*.tf"
      - "infra/.terraform-docs.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: terraform-docs check
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: infra/modules/cloudflare-dns-records,infra/modules/cloudflare-email-routing,infra/modules/cloudflare-redirect,infra/stacks/niqostudio-com,infra/stacks/niqo-studio
          config-file: infra/.terraform-docs.yml
          output-file: README.md
          output-method: inject
          fail-on-diff: true

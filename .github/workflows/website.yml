name: website

# website のビルド検証＋本番 deploy。Pages の箱は infra が config.<env>.json から作成（direct-upload・
# 箱が無いと deploy は失敗＝先に terraform-apply）。deploy は main への push 時のみ。
# canonical ドメインは root の config.<env>.json を website が直読する（DEPLOY_ENV で選択・既定 production）。
on:
  pull_request:
    paths: ["website/**", "config.*.json", ".github/workflows/website.yml"]
  push:
    branches: [main]
    paths: ["website/**", "config.*.json", ".github/workflows/website.yml"]
  workflow_dispatch: # website 変更なしでも手動で build+deploy を回せる

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'niqostudio/niqostudio'
    runs-on: ubuntu-latest
    # SSG ビルドは公開値で実データを取得する（公開鍵＝Repository Variable・RLS 準拠）。
    # prebuild / build / check のいずれでも参照され得るのでジョブレベルで渡す。
    # ドメインは root の config.<env>.json を直読（DEPLOY_ENV 未設定＝production）。
    env:
      PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # workspace の root lockfile を使う。website とその workspace 依存（db-types）のみ入れる。
      - run: pnpm install --frozen-lockfile --filter @niqostudio/website...
      - run: pnpm build
      - run: pnpm check
      # 本番 deploy 用に静的成果物を受け渡す（push / 手動 dispatch。PR ではアップロードしない）。
      # @astrojs/cloudflare は dist/client（静的）と dist/server（worker）に分割する。Pages へは静的の client を配信。
      - if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist/client
          include-hidden-files: true
          retention-days: 1

  # push / 手動 dispatch で Cloudflare Pages へ direct-upload（PR は除く）。secret は website-production にスコープ。
  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.repository == 'niqostudio/niqostudio'
    runs-on: ubuntu-latest
    environment: website-production
    steps:
      - uses: actions/checkout@v5
      # wrangler-action は repo の packageManager(pnpm) を使うため pnpm/node を用意する。
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist/client
      # project 名は config.<env>.json の primary ドメイン配下から取得（単一正本・ハードコードしない）。
      - id: cfg
        run: echo "name=$(jq -r '.domains[.primary].pages.website.project_name' config.production.json)" >> "$GITHUB_OUTPUT"
      # pages.dev へ直アクセスされたら canonical（config の primary）へ 301。host 判定が要るため _redirects 不可。
      # Pages advanced mode の _worker.js を生成（primary は config 駆動でハードコードしない）。静的は ASSETS で配信。
      - name: generate _worker.js（pages.dev → primary の 301）
        run: |
          primary=$(jq -r '.primary' config.production.json)
          cat > website/dist/client/_worker.js <<EOF
          export default {
            async fetch(request, env) {
              const url = new URL(request.url);
              if (url.hostname.endsWith('.pages.dev')) {
                return Response.redirect('https://$primary' + url.pathname + url.search, 301);
              }
              return env.ASSETS.fetch(request);
            },
          };
          EOF
          rm -f website/dist/client/.assetsignore
      # wrangler-action は pnpm workspace でルート追加を拒否され失敗するため、dlx で直接実行する（workspace を汚さない）。
      - name: deploy（箱は infra が作成済み前提＝未作成なら失敗）
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_DEPLOY_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
        run: pnpm dlx wrangler@3.90.0 pages deploy website/dist/client --project-name=${{ steps.cfg.outputs.name }} --branch=main

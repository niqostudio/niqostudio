name: "website: build & deploy"

# website のビルド検証＋本番 deploy。@astrojs/cloudflare のネイティブ形式（Worker＝SSR＋静的アセット）を
# wrangler deploy で配信する。カスタムドメインの束ねは infra が管理（workers.tf）。Worker は本 deploy で
# 作られるため、初回のみ website deploy → terraform-apply の順（以後は順不同・冪等）。
# 本番反映は dispatch 専用（core/infra と統一・承認ゲート）。PR は build 検証のみ。
# canonical ドメインは root の config.<env>.json を website が直読する（DEPLOY_ENV で選択・既定 production）。
on:
  pull_request:
    paths: ["website/**", "config.*.json", ".github/workflows/website.yml"]
  workflow_dispatch: # 本番 build + deploy は明示の dispatch で回す

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'niqostudio/niqostudio'
    runs-on: ubuntu-latest
    # PUBLIC_SUPABASE_* は $GITHUB_ENV で出し分ける（PR＝一時 Supabase / deploy＝本番）。
    # job 直下 env に置くと毎ステップで再適用され、$GITHUB_ENV での上書きを潰すため、ここには置かない。
    # ドメインは root の config.<env>.json を直読（DEPLOY_ENV 未設定＝production）。
    env:
      # Turnstile の site key（公開・未設定ならウィジェット非表示で検証 skip）。secret は deploy 側で投入。
      PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # website（＋workspace 依存）。PR は一時 Supabase 用に infra（supabase CLI）と root（dbmate / seed）も入れる。
      - run: pnpm install --frozen-lockfile --filter @niqostudio/website... --filter @niqostudio/infra --filter niqostudio-mono
      # PR は本番に触れず、この PR の migration＋seed を当てた一時 Supabase で検証する（本番は読みも書きもしない）。
      - name: "PR: 一時 Supabase に migration＋seed を当て公開値を向ける"
        if: github.event_name == 'pull_request'
        run: |
          # fresh DB だと PostgREST が core 不在で unhealthy になり、通常の start は health check で teardown する。
          # --ignore-health-check でフル起動を続行 → dbmate でスキーマ＋seed → reload で PostgREST に反映する。
          pnpm --filter @niqostudio/infra exec supabase start --ignore-health-check
          export DATABASE_URL="postgres://postgres:postgres@127.0.0.1:54322/postgres?sslmode=disable"
          pnpm exec dbmate --migrations-dir core/migrations --migrations-table core_migrations --no-dump-schema up
          pnpm exec dbmate --migrations-dir studio/migrations --migrations-table studio_migrations --no-dump-schema up
          db=$(docker ps --filter name=supabase_db --format '{{.Names}}' | head -1)
          docker exec -i "$db" psql -U postgres -d postgres -v ON_ERROR_STOP=1 < core/seeds/dev.sql
          # dbmate で作った core/studio（view/列）を PostgREST のスキーマキャッシュに反映。
          docker exec "$db" psql -U postgres -d postgres -c "notify pgrst, 'reload schema';"
          sleep 8
          env_out=$(pnpm --filter @niqostudio/infra exec supabase status -o env)
          api=$(printf '%s' "$env_out" | sed -n 's/^API_URL="\?\([^"]*\)"\?$/\1/p')
          anon=$(printf '%s' "$env_out" | sed -n 's/^ANON_KEY="\?\([^"]*\)"\?$/\1/p')
          echo "::group::debug REST"
          echo "showcases:"; curl -s -H "apikey: $anon" "$api/rest/v1/public_showcases?select=slug,body_md&limit=2"; echo
          echo "::endgroup::"
          echo "PUBLIC_SUPABASE_URL=$api" >> "$GITHUB_ENV"
          echo "PUBLIC_SUPABASE_PUBLISHABLE_KEY=$anon" >> "$GITHUB_ENV"
      # deploy（push/dispatch）は本番の公開値で build（本番は migrate 済み前提・ゲート順）。
      - name: "deploy: 本番 Supabase 公開値を使う（PR 以外）"
        if: github.event_name != 'pull_request'
        run: |
          echo "PUBLIC_SUPABASE_URL=${{ vars.PUBLIC_SUPABASE_URL }}" >> "$GITHUB_ENV"
          echo "PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ vars.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
      - run: pnpm --filter @niqostudio/website run build
      - run: pnpm --filter @niqostudio/website run check
      # 本番 deploy 用に成果物を受け渡す（push / 手動 dispatch。PR ではアップロードしない）。
      # @astrojs/cloudflare は dist/client（静的）と dist/server（Worker＝entry.mjs + wrangler.json）に分割する。
      # Worker デプロイには両方要る（wrangler.json の assets.directory が ../client を指す）。
      - if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: website-dist
          path: website/dist
          include-hidden-files: true
          retention-days: 1

  # push / 手動 dispatch で Cloudflare Workers へ deploy（PR は除く）。secret は website-production にスコープ。
  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.repository == 'niqostudio/niqostudio'
    runs-on: ubuntu-latest
    environment: website-production
    steps:
      # .nvmrc と packageManager(pnpm) 解決のため checkout する（成果物自体は artifact から取る）。
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - uses: actions/download-artifact@v8
        with:
          name: website-dist
          path: website/dist
      # 版固定した wrangler（devDeps）を入れる。artifact に node_modules は含まれないため deploy job で install する。
      - run: pnpm install --frozen-lockfile --filter @niqostudio/website
      # フェイルクローズ: 構成不変条件を deploy 前に検査する（secret は website-production にしか無いため deploy job で）。
      - name: 必須 secret の整合チェック
        env:
          SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
          SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          INQUIRY_JWT: ${{ secrets.SUPABASE_INQUIRY_WRITER_JWT }}
        run: |
          # ウィジェットを出している（site key 設定済み）のに Turnstile secret が空＝検証 skip の構成ミス。
          if [ -n "$SITE_KEY" ] && [ -z "$SECRET_KEY" ]; then
            echo "::error::PUBLIC_TURNSTILE_SITE_KEY が設定されているのに TURNSTILE_SECRET_KEY が空です"
            exit 1
          fi
          # anon は inquiries の INSERT を剥奪済み＝問い合わせは inquiry_writer JWT 必須。空だと全送信が 500。
          if [ -z "$INQUIRY_JWT" ]; then
            echo "::error::SUPABASE_INQUIRY_WRITER_JWT が空です（問い合わせ INSERT に必須）"
            exit 1
          fi
      # adapter 生成の wrangler.json をそのまま使う（assets.directory=../client）。版固定 wrangler を bin 直叩きで実行。
      # cwd=dist/server を保つため bin パス指定（pnpm exec は非パッケージ dir から bin を解決できない）。
      - name: deploy（Worker = SSR + 静的アセット）
        working-directory: website/dist/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_DEPLOY_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
        run: |
          # adapter 既定の worker 名（package 名由来 niqostudio-website）を config の role キーに合わせて website に上書き
          # （workers.dev を張る場合 website.<account>.workers.dev となり niqostudio の重複を避ける。service 束ねも一致）。
          # workers.dev プレビュー URL は使わない（canonical は infra のカスタムドメインのみ＝重複ホストを作らない）。
          # Astro session 用 KV は未使用で id 未指定の binding は deploy が拒否するため除去する。
          name=$(jq -r '.domains[.primary].workers.website.name' "$GITHUB_WORKSPACE/config.production.json")
          # html_handling=drop-trailing-slash で配信も末尾スラッシュなしに統一（/foo/ → /foo へリダイレクト）。
          jq --arg n "$name" '.name = $n | .topLevelName = $n | del(.kv_namespaces) | del(.previews.kv_namespaces) | .workers_dev = false | .assets.html_handling = "drop-trailing-slash"' wrangler.json > w.json && mv w.json wrangler.json
          ../../node_modules/.bin/wrangler deploy
      # フォーム送信に要る実行時値（公開値ではない＝ビルドにインラインされない）。worker 作成後に設定する。
      - name: runtime secrets（Resend / Turnstile / JWT / webhook）
        working-directory: website/dist/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_DEPLOY_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SUPABASE_INQUIRY_WRITER_JWT: ${{ secrets.SUPABASE_INQUIRY_WRITER_JWT }}
          SUPABASE_INQUIRY_READER_JWT: ${{ secrets.SUPABASE_INQUIRY_READER_JWT }}
          RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
        run: |
          # 空値は載せない（未導入の Turnstile 等は skip）。secret bulk は JSON を一括投入する。
          jq -n \
            --arg r "$RESEND_API_KEY" --arg ts "$TURNSTILE_SECRET_KEY" \
            --arg ij "$SUPABASE_INQUIRY_WRITER_JWT" --arg ir "$SUPABASE_INQUIRY_READER_JWT" \
            --arg wh "$RESEND_WEBHOOK_SECRET" \
            '{RESEND_API_KEY:$r, TURNSTILE_SECRET_KEY:$ts, SUPABASE_INQUIRY_WRITER_JWT:$ij, SUPABASE_INQUIRY_READER_JWT:$ir, RESEND_WEBHOOK_SECRET:$wh}
             | with_entries(select(.value != ""))' > secrets.json
          ../../node_modules/.bin/wrangler secret bulk secrets.json
          rm -f secrets.json

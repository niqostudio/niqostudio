name: terraform

# infra の fmt / validate。シークレット不要なので fork PR でも安全に動く。
on:
  pull_request:
    paths: ["infra/**", "config.*.json"]
  push:
    branches: [main]
    paths: ["infra/**", "config.*.json"]

permissions:
  contents: read

defaults:
  run:
    working-directory: infra

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"
      - name: fmt
        run: terraform fmt -recursive -check -diff
      # backend 無しで init して validate（リモート state / API に触れない）。
      - name: validate
        run: |
          for dir in stacks/*/; do
            echo "== validate $dir =="
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
          done

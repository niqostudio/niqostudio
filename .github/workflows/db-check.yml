name: "db: check"

# PR チェック：(1) 適用済み migration の改竄防止（既存ファイルの変更/削除を拒否）、
# (2) migrations から生成した型がコミット済み db-types とドリフトしていないか。
on:
  pull_request:
    paths:
      - "core/migrations/**"
      - "studio/migrations/**"
      - "packages/db-types/src/database.ts"

permissions:
  contents: read

jobs:
  # 前進専用の担保：マージ済み migration ファイルの変更・削除を禁止（新規追加のみ許可）。
  guard:
    if: github.repository == 'niqostudio/niqostudio'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 既存 migration の変更/削除がないか
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          changed=$(git diff --diff-filter=MD --name-only "$base"...HEAD -- 'core/migrations/*.sql' 'studio/migrations/*.sql')
          if [ -n "$changed" ]; then
            echo "::error::適用済み migration の変更/削除は禁止です（前進 migration を追加してください）:"
            echo "$changed"
            exit 1
          fi
          echo "OK: 既存 migration は不変"

  # 型の正本は migrations。local stack に dbmate で適用 → 生成 → コミット済みと比較。
  drift:
    if: github.repository == 'niqostudio/niqostudio'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --filter niqostudio-mono --filter @niqostudio/infra
      - name: local supabase 起動（DB のみ・PostgREST は不要）
        # このジョブは DB＋dbmate＋gen types(--local=pg 直接) だけ。PostgREST は起動時に
        # 露出スキーマ（core/studio）の存在を要求するが、それらは後段の dbmate で作るため除外する。
        run: pnpm --filter @niqostudio/infra exec supabase start -x postgrest
      - name: dbmate で core スキーマを適用
        env:
          DATABASE_URL: "postgres://postgres:postgres@127.0.0.1:54322/postgres?sslmode=disable"
        run: pnpm exec dbmate --migrations-dir core/migrations --migrations-table core_migrations --no-dump-schema up
      - name: migrations から型を生成
        run: pnpm db:types
      - name: ドリフト検知（差分があれば fail）
        run: git diff --exit-code -- packages/db-types/src/database.ts

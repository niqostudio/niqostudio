name: "core: migrate"

# 適用は明示の dispatch のみ（push 自動の dry-run は廃止）。dry-run は apply=false で実行。
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "true で本番適用 / false は dry-run のみ"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  push:
    if: github.repository == 'niqostudio/niqostudio'
    runs-on: ubuntu-latest
    environment: core-production # 承認ゲート + secret をモジュールにスコープ（最小権限）
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # workspace の root lockfile を使う。core のみ入れる（website の重い依存は不要）。
      - run: pnpm install --frozen-lockfile --filter @niqostudio/core
      - name: db push
        # 接続は Session pooler（IPv4）。GitHub runner は IPv6 直結に届かないため。
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.apply }}" = "true" ]; then
            echo "本番へ適用します"
            pnpm exec supabase db push --db-url "$SUPABASE_DB_URL" --yes
          else
            echo "dry-run（適用なし）"
            pnpm exec supabase db push --db-url "$SUPABASE_DB_URL" --dry-run
          fi
